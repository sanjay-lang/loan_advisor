<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Optimize Loan Advisor</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: #eef2f7;
        color: #172033;
      }

      .shell {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 34px 20px 48px;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        color: #243c8f;
        font-size: 32px;
      }

      header p {
        margin: 0;
        color: #667085;
      }

      form {
        overflow: hidden;
        border: 1px solid #dce3ee;
        border-radius: 8px;
        background: white;
        box-shadow: 0 12px 35px rgba(36, 60, 143, 0.08);
      }

      section {
        padding: 26px;
      }

      section + section {
        border-top: 1px solid #e7ebf2;
      }

      h2 {
        margin: 0 0 18px;
        font-size: 19px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .field {
        min-width: 0;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        display: block;
        margin-bottom: 7px;
        color: #344054;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        height: 46px;
        padding: 0 13px;
        border: 1px solid #cfd7e6;
        border-radius: 6px;
        color: #172033;
        background: white;
        font: inherit;
      }

      input:focus,
      select:focus {
        border-color: #243c8f;
        outline: 3px solid rgba(36, 60, 143, 0.12);
      }

      .hint {
        display: block;
        margin-top: 6px;
        color: #7a8494;
        font-size: 12px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        padding: 20px 26px;
        border-top: 1px solid #e7ebf2;
        background: #f8faff;
      }

      button {
        min-height: 46px;
        padding: 0 24px;
        border: 0;
        border-radius: 6px;
        background: #243c8f;
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #1c3075;
      }

      .error {
        margin-bottom: 18px;
        padding: 13px 16px;
        border: 1px solid #fecaca;
        border-radius: 6px;
        background: #fef2f2;
        color: #991b1b;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 24px 12px 36px;
        }

        h1 {
          font-size: 27px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .field.full {
          grid-column: auto;
        }

        section {
          padding: 21px 18px;
        }

        .actions {
          padding: 18px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Optimize Loan Advisor</h1>
        <p>Enter customer and loan details to generate a personalized strategy report.</p>
      </header>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        <section>
          <h2>Customer Details</h2>
          <div class="grid">
            <div class="field">
              <label for="customer_name">Customer Name</label>
              <input
                id="customer_name"
                name="customer_name"
                value="{{ values.get('customer_name', '') }}"
                required
              >
            </div>
            <div class="field">
              <label for="phone">Phone Number</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                value="{{ values.get('phone', '') }}"
                required
              >
            </div>
            <div class="field full">
              <label for="email">Email Address</label>
              <input
                id="email"
                name="email"
                type="email"
                value="{{ values.get('email', '') }}"
                required
              >
            </div>
          </div>
        </section>

        <section>
          <h2>Loan Details</h2>
          <div class="grid">
            <div class="field">
              <label for="loan_amount">Outstanding Loan Amount</label>
              <input
                id="loan_amount"
                name="loan_amount"
                type="number"
                min="1000"
                step="1000"
                value="{{ values.get('loan_amount', '') }}"
                required
              >
            </div>
            <div class="field">
              <label for="remaining_tenure">Remaining Tenure</label>
              <input
                id="remaining_tenure"
                name="remaining_tenure"
                type="number"
                min="1"
                max="40"
                value="{{ values.get('remaining_tenure', '') }}"
                required
              >
              <span class="hint">Enter tenure in years.</span>
            </div>
            <div class="field">
              <label for="current_rate">Current Interest Rate (%)</label>
              <input
                id="current_rate"
                name="current_rate"
                type="number"
                min="0"
                max="30"
                step="0.01"
                value="{{ values.get('current_rate', '') }}"
                required
              >
            </div>
            <div class="field">
              <label for="new_rate">Proposed New Rate (%)</label>
              <input
                id="new_rate"
                name="new_rate"
                type="number"
                min="0"
                max="30"
                step="0.01"
                value="{{ values.get('new_rate', '') }}"
                required
              >
            </div>
          </div>
        </section>

        <section>
          <h2>Transfer and Prepayment</h2>
          <div class="grid">
            <div class="field">
              <label for="processing_fee">Processing Fee</label>
              <input
                id="processing_fee"
                name="processing_fee"
                type="number"
                min="0"
                step="100"
                value="{{ values.get('processing_fee', '0') }}"
                required
              >
            </div>
            <div class="field">
              <label for="legal_fee">Legal Fee</label>
              <input
                id="legal_fee"
                name="legal_fee"
                type="number"
                min="0"
                step="100"
                value="{{ values.get('legal_fee', '0') }}"
                required
              >
            </div>
            <div class="field full">
              <label for="extra_monthly_payment">Extra Monthly Prepayment</label>
              <select
                id="extra_monthly_payment"
                name="extra_monthly_payment"
                required
              >
                {% set selected_payment = values.get('extra_monthly_payment', '5000') %}
                <option value="0" {% if selected_payment == '0' %}selected{% endif %}>No extra payment</option>
                <option value="5000" {% if selected_payment == '5000' %}selected{% endif %}>Rs. 5,000 per month</option>
                <option value="10000" {% if selected_payment == '10000' %}selected{% endif %}>Rs. 10,000 per month</option>
                <option value="20000" {% if selected_payment == '20000' %}selected{% endif %}>Rs. 20,000 per month</option>
              </select>
              <span class="hint">Choose a realistic recurring prepayment amount.</span>
            </div>
          </div>
        </section>

        <div class="actions">
          <button type="submit">Generate Loan Strategy Report</button>
        </div>
      </form>
    </main>
  </body>
</html>
